version: 2

models:
  - name: stg_orders
    description: "Cleaned orders data from raw layer"

    columns:

      - name: invoice_id
        description: "Invoice identifier"
        tests:
          - not_null

      - name: product_id
        description: "Product identifier"
        tests:
          - not_null

      - name: quantity
        description: "Number of products in order"
        tests:
          - not_null

      - name: unit_price
        description: "Price per product"
        tests:
          - not_null

      - name: customer_id
        description: "Customer identifier"